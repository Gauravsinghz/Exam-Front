<mat-toolbar color="accent">
    <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
      <mat-icon>menu_book</mat-icon>
    </button>
    <span>PARIKSHA</span>
    <span class="example-spacer"></span>
    <a   *ngIf="!isLoggedIn"
    routerLink="/login" mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon">
     Login   
    </a>
    <a *ngIf="!isLoggedIn" routerLink="/signup" style="margin-left: 20px; margin-right: 20px;" mat-icon-button class="example-icon mr20 ml20" aria-label="Example icon-button with share icon">
     Register  
    </a>

    <button  routerLink="/admin/profile"  *ngIf="isLoggedIn && user"  style="margin-left: 20px; margin-right: 20px;" mat-icon-button class="example-icon mr20 ml20" aria-label="Example icon-button with share icon">
        {{user.username}}
    </button>

    <a  (click)="logout()" *ngIf="isLoggedIn"  style="margin-left: 20px; margin-right: 20px;" mat-icon-button class="example-icon mr20 ml20" aria-label="Example icon-button with share icon">
        Logout  
       </a>
  </mat-toolbar>
