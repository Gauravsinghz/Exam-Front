<div class="bootstrap-wrapper">
    <div class="container">
        <div class="row" >
            <div class="col-md-6 offset-md-3">
                <mat-card>

                <div class="container text-center">
                    <img style="width: 40%; height: 30%;" src="../../../assets/logo.png" alt="">
                </div>
                <h1 class="text-center">Login here!!</h1>

                <form (ngSubmit)="formSubmit()" >
                     <!-- Username -->
                     <mat-form-field appearance="outline" class="full-width">
                        <mat-label>User Name</mat-label>
                        <input [(ngModel)]="loginData.username" name="username" required   matInput placeholder="Enter here">
                        <mat-hint>Valid User Name</mat-hint>
                      </mat-form-field>

                      <!-- password -->
                      <mat-form-field appearance="outline" class="full-width">
                        <mat-label>User Password</mat-label>
                        <input [(ngModel)]="loginData.password" name="password" required  matInput placeholder="Enter here">
                    
                      </mat-form-field>


                <div class="container text-center">
                    <button type="submit" mat-raised-button color="primary" >Login</button>
                    <button style="margin-left: 20px;" mat-raised-button color="accent" >Clear</button>

                  </div>
            </form>
        </mat-card>

            </div>

        </div>
    </div>
</div>
